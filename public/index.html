<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Topai WhatsApp Bot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --green-light: #dcf8c6;
      --bg: #0a0f0d;
      --card: #111916;
      --border: #1e2e23;
      --text: #e8f5e3;
      --muted: #6b8f72;
      --error: #ff5a5a;
      --warn: #ffb347;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header { text-align: center; margin-bottom: 36px; }
    header .logo { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; color: var(--green); }
    header .logo span { color: var(--text); }
    header p { margin-top: 6px; color: var(--muted); font-size: 0.95rem; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #0d2014; border: 1px solid var(--border);
      border-radius: 99px; padding: 4px 12px;
      font-size: 0.78rem; color: var(--green); margin-top: 10px;
    }
    .badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); animation: pulse 2s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .main-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px;
      width: 100%; max-width: 480px;
    }

    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--text); }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }

    input[type="text"] {
      width: 100%; padding: 13px 16px;
      background: #0d1a10; border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 1rem;
      outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--green); }
    input[type="text"]::placeholder { color: var(--muted); }

    .method-tabs { display: flex; gap: 8px; margin: 16px 0; }
    .tab-btn {
      flex: 1; padding: 10px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
    }
    .tab-btn.active { background: #0d2014; border-color: var(--green); color: var(--green); }

    .connect-btn {
      width: 100%; margin-top: 20px; padding: 14px;
      background: var(--green); color: #000; font-weight: 700;
      font-size: 0.95rem; border: none; border-radius: 12px;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .connect-btn:hover { opacity: 0.9; }
    .connect-btn:active { transform: scale(0.98); }
    .connect-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-box { margin-top: 24px; display: none; }
    .result-box.show { display: block; }

    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 14px; border-radius: 99px;
      font-size: 0.85rem; font-weight: 600; margin-bottom: 16px;
    }
    .status-connecting { background: #1a1a00; color: var(--warn); border: 1px solid #3a3a00; }
    .status-qr { background: #001a1a; color: #00e5ff; border: 1px solid #003a3a; }
    .status-pair { background: #001a0f; color: var(--green); border: 1px solid #003a1a; }
    .status-connected { background: #001a0a; color: var(--green); border: 1px solid var(--green-dark); }
    .status-error { background: #1a0000; color: var(--error); border: 1px solid #3a0000; }

    .pair-code-display {
      background: #0a1f10; border: 1px solid var(--green-dark);
      border-radius: 14px; padding: 20px; text-align: center;
    }
    .pair-code-display p { color: var(--muted); font-size: 0.82rem; margin-bottom: 12px; }
    .pair-code {
      font-size: 2.2rem; font-weight: 800; letter-spacing: 8px;
      color: var(--green); font-family: 'Courier New', monospace;
    }

    .refresh-code-btn {
      margin-top: 12px; padding: 8px 20px;
      background: transparent; border: 1px solid var(--green-dark);
      color: var(--green); border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; transition: all 0.2s;
    }
    .refresh-code-btn:hover { background: #0d2014; }
    .refresh-code-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .pair-steps {
      margin-top: 14px; padding: 12px 14px;
      background: #0d1a10; border-radius: 10px;
      font-size: 0.8rem; color: var(--muted); line-height: 1.7; text-align: left;
    }
    .pair-steps strong { color: var(--text); }

    .qr-display { text-align: center; }
    .qr-display img {
      width: 220px; height: 220px; border-radius: 12px;
      border: 3px solid var(--green-dark); background: white; padding: 4px;
    }
    .qr-display p { margin-top: 12px; color: var(--muted); font-size: 0.82rem; }

    .connected-display { text-align: center; padding: 20px; }
    .connected-display .check { font-size: 3rem; }
    .connected-display p { color: var(--muted); font-size: 0.88rem; margin-top: 8px; }
    .connected-display .number { font-size: 1.1rem; font-weight: 700; color: var(--green); margin-top: 4px; }

    .disconnect-btn {
      margin-top: 16px; padding: 10px 24px;
      background: transparent; border: 1px solid var(--error);
      color: var(--error); border-radius: 10px; cursor: pointer;
      font-size: 0.85rem; transition: all 0.2s;
    }
    .disconnect-btn:hover { background: #1a0000; }

    .sessions-section { width: 100%; max-width: 480px; margin-top: 24px; }
    .sessions-section h3 {
      font-size: 0.9rem; color: var(--muted); margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .session-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;
    }
    .session-item .session-phone { font-weight: 600; font-size: 0.95rem; }
    .session-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .dot-connected { background: var(--green); }
    .dot-connecting { background: var(--warn); animation: pulse 2s infinite; }
    .dot-error { background: var(--error); }
    .session-item .session-status-text { font-size: 0.8rem; color: var(--muted); }
    .session-item button {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 6px 12px; border-radius: 8px;
      cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    }
    .session-item button:hover { border-color: var(--error); color: var(--error); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--green);
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }

    footer { margin-top: 40px; color: var(--muted); font-size: 0.78rem; text-align: center; }
  </style>
</head>
<body>

<header>
  <div class="logo">Topai<span>Bot</span></div>
  <p>Multi-User WhatsApp Bot — Connect any number</p>
  <div class="badge">
    <span class="dot"></span>
    <span id="server-status">Server Online</span>
  </div>
</header>

<div class="main-card">
  <h2>Connect WhatsApp Number</h2>

  <label for="phone-input">Phone Number (with country code)</label>
  <input type="text" id="phone-input" placeholder="e.g. 2349137250390" maxlength="20" />

  <div class="method-tabs">
    <button class="tab-btn active" data-method="pair">📲 Pair Code</button>
    <button class="tab-btn" data-method="qr">📷 QR Code</button>
  </div>

  <button class="connect-btn" id="connect-btn">Connect Number</button>

  <div class="result-box" id="result-box">
    <div id="result-content"></div>
  </div>
</div>

<div class="sessions-section">
  <h3>Active Sessions (<span id="session-count">0</span>)</h3>
  <div id="sessions-list"></div>
</div>

<footer>
  Topai WhatsApp Bot · Multi-User Edition · Powered by Baileys
</footer>

<script>
  let selectedMethod = 'pair';
  let currentPhone = null;
  let eventSource = null;

  // ── Tab switching ──────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedMethod = btn.dataset.method;
    });
  });

  // ── Connect button ─────────────────────────────────────────
  document.getElementById('connect-btn').addEventListener('click', async () => {
    const phone = document.getElementById('phone-input').value.replace(/\D/g, '');
    if (!phone || phone.length < 7) {
      alert('Please enter a valid phone number with country code.');
      return;
    }
    startConnection(phone, selectedMethod);
  });

  async function startConnection(phone, method) {
    currentPhone = phone;
    localStorage.setItem('topai_phone', phone);
    localStorage.setItem('topai_method', method);

    const btn = document.getElementById('connect-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Connecting...';

    showResult(`<div class="status-badge status-connecting">
      <span class="spinner"></span> Initializing session...
    </div>`);

    try {
      const res = await fetch('/api/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, method })
      });
      const data = await res.json();

      if (!data.success && data.error !== 'Already connected') {
        showResult(`<div class="status-badge status-error">❌ ${data.error}</div>`);
        btn.disabled = false;
        btn.innerHTML = 'Connect Number';
        return;
      }

      subscribeToEvents(phone);
    } catch (err) {
      showResult(`<div class="status-badge status-error">❌ ${err.message}</div>`);
      btn.disabled = false;
      btn.innerHTML = 'Connect Number';
    }
  }

  // ── SSE subscription ───────────────────────────────────────
  function subscribeToEvents(phone) {
    if (eventSource) eventSource.close();
    eventSource = new EventSource(`/api/events/${phone}`);
    eventSource.onmessage = (e) => {
      const data = JSON.parse(e.data);
      handleStatusUpdate(data, phone);
    };
    eventSource.onerror = () => {};
  }

  // ── Status update handler ──────────────────────────────────
  function handleStatusUpdate(data, phone) {
    const btn = document.getElementById('connect-btn');

    switch (data.status) {
      case 'pair_code':
        btn.disabled = false;
        btn.innerHTML = 'Connect Number';
        showResult(`
          <div class="status-badge status-pair">📲 Enter this code in WhatsApp</div>
          <div class="pair-code-display">
            <p>Pairing Code for +${phone}</p>
            <div class="pair-code" id="pair-code-text">${data.pairCode}</div>
            <button class="refresh-code-btn" id="refresh-btn" onclick="refreshCode('${phone}')">🔄 Get New Code</button>
            <div class="pair-steps">
              <strong>How to pair:</strong><br>
              1. Open WhatsApp on your phone<br>
              2. Go to <strong>Linked Devices</strong><br>
              3. Tap <strong>Link a Device</strong><br>
              4. Tap <strong>Link with phone number instead</strong><br>
              5. Enter your number → tap Next<br>
              6. Type the code above quickly (expires in ~60s)
            </div>
          </div>
        `);
        break;

      case 'qr':
        btn.disabled = false;
        btn.innerHTML = 'Connect Number';
        showResult(`
          <div class="status-badge status-qr">📷 Scan QR Code</div>
          <div class="qr-display">
            <img src="${data.qrBase64}" alt="QR Code" />
            <p>Open WhatsApp → Linked Devices → Link a Device → Scan this QR</p>
          </div>
        `);
        break;

      case 'connected':
        localStorage.setItem('topai_phone', phone);
        showConnected(phone, data.botNumber || phone);
        eventSource?.close();
        loadSessions();
        break;

      case 'awaiting_pair':
        // Already waiting — check if pairCode exists
        if (data.pairCode) {
          handleStatusUpdate({ status: 'pair_code', pairCode: data.pairCode }, phone);
        }
        break;

      case 'reconnecting':
        showResult(`<div class="status-badge status-connecting"><span class="spinner"></span> Reconnecting...</div>`);
        break;

      case 'logged_out':
        localStorage.removeItem('topai_phone');
        showResult(`<div class="status-badge status-error">🚪 Logged out from WhatsApp</div>`);
        eventSource?.close();
        loadSessions();
        break;

      case 'error':
        showResult(`<div class="status-badge status-error">❌ ${data.error || 'Connection error'}</div>`);
        btn.disabled = false;
        btn.innerHTML = 'Connect Number';
        break;

      case 'disconnected':
        localStorage.removeItem('topai_phone');
        showResult(`<div class="status-badge status-error">🔌 Disconnected</div>`);
        eventSource?.close();
        btn.disabled = false;
        btn.innerHTML = 'Connect Number';
        loadSessions();
        break;
    }
  }

  function showConnected(phone, botNumber) {
    const btn = document.getElementById('connect-btn');
    btn.disabled = false;
    btn.innerHTML = 'Connect Number';
    showResult(`
      <div class="status-badge status-connected">✅ Connected</div>
      <div class="connected-display">
        <div class="check">🎉</div>
        <p>Bot successfully connected as</p>
        <div class="number">+${botNumber}</div>
        <button class="disconnect-btn" onclick="disconnect('${phone}')">Disconnect</button>
      </div>
    `);
  }

  // ── Refresh pair code ──────────────────────────────────────
  async function refreshCode(phone) {
    const btn = document.getElementById('refresh-btn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Getting new code...'; }

    // Disconnect old session and start fresh
    try { await fetch(`/api/disconnect/${phone}`, { method: 'POST' }); } catch (_) {}
    await new Promise(r => setTimeout(r, 1000));

    showResult(`<div class="status-badge status-connecting"><span class="spinner"></span> Getting fresh code...</div>`);

    try {
      const res = await fetch('/api/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, method: 'pair' })
      });
      const data = await res.json();
      if (data.success || data.error === 'Already connected') {
        subscribeToEvents(phone);
      } else {
        showResult(`<div class="status-badge status-error">❌ ${data.error}</div>`);
      }
    } catch (err) {
      showResult(`<div class="status-badge status-error">❌ ${err.message}</div>`);
    }
  }

  function showResult(html) {
    const box = document.getElementById('result-box');
    document.getElementById('result-content').innerHTML = html;
    box.classList.add('show');
  }

  async function disconnect(phone) {
    await fetch(`/api/disconnect/${phone}`, { method: 'POST' });
    localStorage.removeItem('topai_phone');
    showResult(`<div class="status-badge status-error">🔌 Disconnected</div>`);
    loadSessions();
  }

  async function loadSessions() {
    try {
      const res = await fetch('/api/sessions');
      const { sessions } = await res.json();
      document.getElementById('session-count').textContent = sessions.length;

      const list = document.getElementById('sessions-list');
      if (sessions.length === 0) {
        list.innerHTML = '<p style="color: var(--muted); font-size: 0.85rem;">No active sessions</p>';
        return;
      }

      list.innerHTML = sessions.map(s => {
        const dotClass = s.status === 'connected' ? 'dot-connected'
          : s.status === 'error' || s.status === 'logged_out' ? 'dot-error'
          : 'dot-connecting';
        return `
          <div class="session-item">
            <div>
              <div class="session-phone">+${s.phone}</div>
              <div class="session-status-text">
                <span class="session-status-dot ${dotClass}"></span>${s.status}
              </div>
            </div>
            <button onclick="disconnect('${s.phone}')">Disconnect</button>
          </div>
        `;
      }).join('');
    } catch (_) {}
  }

  // ── AUTO-RESTORE on page refresh ───────────────────────────
  // This is the key fix: remember the phone and restore state
  async function restoreSession() {
    const savedPhone = localStorage.getItem('topai_phone');
    if (!savedPhone) return;

    // Pre-fill the phone input
    document.getElementById('phone-input').value = savedPhone;
    currentPhone = savedPhone;

    try {
      const res = await fetch(`/api/status/${savedPhone}`);
      const data = await res.json();

      if (data.status === 'connected') {
        // Bot is still running — show connected state immediately
        showConnected(savedPhone, savedPhone);
        subscribeToEvents(savedPhone);

      } else if (data.status === 'awaiting_pair' && data.pairCode) {
        // Still waiting for pair — show the code
        showResult(`
          <div class="status-badge status-pair">📲 Enter this code in WhatsApp</div>
          <div class="pair-code-display">
            <p>Pairing Code for +${savedPhone}</p>
            <div class="pair-code">${data.pairCode}</div>
            <button class="refresh-code-btn" id="refresh-btn" onclick="refreshCode('${savedPhone}')">🔄 Get New Code</button>
            <div class="pair-steps">
              <strong>How to pair:</strong><br>
              1. Open WhatsApp → <strong>Linked Devices</strong><br>
              2. Tap <strong>Link a Device</strong><br>
              3. Tap <strong>Link with phone number instead</strong><br>
              4. Enter number → type the code above
            </div>
          </div>
        `);
        subscribeToEvents(savedPhone);

      } else if (data.status === 'connecting' || data.status === 'reconnecting') {
        showResult(`<div class="status-badge status-connecting"><span class="spinner"></span> Reconnecting...</div>`);
        subscribeToEvents(savedPhone);

      } else if (data.status === 'not_found') {
        // Server restarted — auto-reconnect silently
        const savedMethod = localStorage.getItem('topai_method') || 'pair';
        showResult(`<div class="status-badge status-connecting"><span class="spinner"></span> Restoring session...</div>`);
        const r = await fetch('/api/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: savedPhone, method: savedMethod })
        });
        const d = await r.json();
        if (d.success) subscribeToEvents(savedPhone);
      }
    } catch (_) {}
  }

  // Run on page load
  restoreSession();
  loadSessions();
  setInterval(loadSessions, 10000);
</script>
</body>
</html>
